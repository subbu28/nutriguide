# Google Cloud Build configuration for NutriGuide
# Builds and deploys both frontend and backend to Cloud Run

steps:
  # Build and push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-api:latest'
      - '-f'
      - 'server/Dockerfile'
      - 'server'
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutriguide-api:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Build and push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nutriguide-web:latest'
      - '.'
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nutriguide-web:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutriguide-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriguide-api:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'DATABASE_URL=nutriguide-db-url:latest,JWT_SECRET=nutriguide-jwt-secret:latest,STRIPE_SECRET_KEY=nutriguide-stripe-key:latest,GEMINI_API_KEY=nutriguide-gemini-key:latest'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nutriguide-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/nutriguide-web:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
    id: 'deploy-frontend'
    waitFor: ['push-frontend', 'deploy-backend']

substitutions:
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/nutriguide-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nutriguide-api:latest'
  - 'gcr.io/$PROJECT_ID/nutriguide-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nutriguide-web:latest'
