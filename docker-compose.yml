version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: nutriguide-db
    environment:
      POSTGRES_USER: nutriguide
      POSTGRES_PASSWORD: nutriguide_dev_password
      POSTGRES_DB: nutriguide
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriguide"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nutriguide-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://nutriguide:nutriguide_dev_password@db:5555/nutriguide
      JWT_SECRET: dev-jwt-secret-change-in-production
      COOKIE_SECRET: dev-cookie-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  # Frontend Web App
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nutriguide-web
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_WS_URL: ws://localhost:3001
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
